<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Admin - Gestão de Biblioteca</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body style="display: block; padding: 40px; background: #f4f7fe;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1><i class="fa-solid fa-screwdriver-wrench"></i> Painel Admin</h1>
        <button onclick="window.location.href='index.html'" class="btn"
            style="width: 120px; background: #333;">Sair</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
        <div class="admin-section" style="margin:0; text-align: center;">
            <h4 style="color: #7494ec;">Livros Cadastrados</h4>
            <h2 id="stat-total-books">0</h2>
        </div>
        <div class="admin-section" style="margin:0; text-align: center;">
            <h4 style="color: #4caf50;">Empréstimos</h4>
            <h2 id="stat-total-loans">0</h2>
        </div>
        <div class="admin-section" style="margin:0; text-align: center;">
            <h4 style="color: #f44336;">Utilizadores</h4>
            <h2 id="stat-total-users">0</h2>
        </div>
    </div>

    <div class="admin-section">
        <h3><i class="fa-solid fa-plus-circle"></i> Novo Livro</h3>
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 120px; gap: 10px; margin-top: 15px;">
            <input type="text" id="newTitle" placeholder="Título" class="search-box" style="margin:0">
            <input type="text" id="newAuthor" placeholder="Autor" class="search-box" style="margin:0">
            <select id="newCategory" class="search-box" style="margin:0; height: 45px;">
                <option value="" disabled selected>Categoria...</option>
                <option value="Literatura">Literatura</option>
                <option value="Programação">Programação</option>
                <option value="História">História</option>
                <option value="Ciências">Ciências</option>
            </select>
            <input type="number" id="newStock" placeholder="Qtd" class="search-box" style="margin:0; width: 100%;">
        </div>
        <button onclick="addBook()" class="btn" style="margin-top: 15px;">Salvar no Catálogo</button>
    </div>

    <div class="admin-section">
        <h3><i class="fa-solid fa-list-check"></i> Gestão de Stock</h3>
        <table>
            <thead>
                <tr>
                    <th>Título / Autor</th>
                    <th>Categoria</th>
                    <th>Stock</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="adminTable"></tbody>
        </table>
    </div>

    <div class="admin-section">
        <h3><i class="fa-solid fa-users"></i> Utilizadores</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Remover</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>

    <div class="admin-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3><i class="fa-solid fa-history"></i> Atividade Recente</h3>
            <button onclick="clearHistory()"
                style="background:none; border:none; color: #f44336; cursor:pointer;">Limpar Tudo</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Utilizador</th>
                    <th>Livro</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <script src="./js/admin.js"></script>
</body>

</html>
